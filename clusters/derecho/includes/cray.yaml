packages:
  adios2:
    require:
    - spec: cuda_arch=80
      when: ^cuda
  all:
    require:
    - spec: cuda_arch=80
      when: ^cuda
  cray-libsci:
    externals:
    - spec: cray-libsci@25.09.0 %cce@20.0.0
      prefix: /opt/cray/pe/libsci/25.09.0/CRAY/20.0/x86_64
    - spec: cray-libsci@25.09.0 %gcc@15.2.0
      prefix: /opt/cray/pe/libsci/25.09.0/GNU/12.3/x86_64
    - spec: cray-libsci@25.09.0 %nvhpc@26.1
      prefix: /opt/cray/pe/libsci/25.09.0/NVIDIA/23.3/x86_64
    - spec: cray-libsci@25.09.0 %intel-oneapi-compilers@2025.3.2
      prefix: /opt/cray/pe/libsci/25.09.0/INTEL/2025.0/x86_64
    buildable: false
  cray-mpich:
    externals:
    - spec: cray-mpich@8.1.33 +cuda cuda_arch=80 +wrappers %gcc@15.2.0 ^libfabric@1.22.0
      prefix: /opt/cray/pe/mpich/8.1.33/ofi/gnu/12.3
    - spec: cray-mpich@8.1.33 +cuda cuda_arch=80 +wrappers %cce@20.0.0 ^libfabric@1.22.0
      prefix: /opt/cray/pe/mpich/8.1.33/ofi/cray/20.0
    - spec: cray-mpich@8.1.33 +cuda cuda_arch=80 +wrappers %nvhpc@26.1 ^libfabric@1.22.0
      prefix: /opt/cray/pe/mpich/8.1.33/ofi/nvidia/23.3
    - spec: cray-mpich@8.1.33 +cuda cuda_arch=80 +wrappers %intel-oneapi-compilers@2025.3.2 ^libfabric@1.22.0
      prefix: /opt/cray/pe/mpich/8.1.33/ofi/intel/2022.1
    - spec: cray-mpich@9.0.1 +cuda cuda_arch=80 +wrappers %gcc@15.2.0 ^libfabric@1.22.0
      prefix: /opt/cray/pe/mpich/9.0.1/ofi/gnu/12.3
    - spec: cray-mpich@9.0.1 +cuda cuda_arch=80 +wrappers %cce@20.0.0 ^libfabric@1.22.0
      prefix: /opt/cray/pe/mpich/9.0.1/ofi/cray/20.0
    - spec: cray-mpich@9.0.1 +cuda cuda_arch=80 +wrappers %nvhpc@26.1 ^libfabric@1.22.0
      prefix: /opt/cray/pe/mpich/9.0.1/ofi/nvidia/23.3
    - spec: cray-mpich@9.0.1 +cuda cuda_arch=80 +wrappers %intel-oneapi-compilers@2025.3.2 ^libfabric@1.22.0
      prefix: /opt/cray/pe/mpich/9.0.1/ofi/intel/2022.1
    buildable: false
  glx:
    require:
    - mesa
  libcxi:
    variants:
    - +cuda
  libfabric:
    variants:
    - fabrics=sockets,tcp,udp,cxi,rxm,rxd,mrail,shm,lnx
  mpi:
    prefer:
    - cray-mpich
  mpich:
    require:
    - spec: cuda_arch=80
      when: +cuda
    - netmod=ofi
    - +xpmem
  mvapich:
    require:
    - netmod=ofi
  mvapich-plus:
    require:
    - spec: cuda_arch=80
      when: +cuda
    - netmod=ofi
  nvtop:
    require:
    - spec: cuda_arch=80
      when: +cuda
  openmpi:
    require:
    - spec: cuda_arch=80
      when: +cuda
    - fabrics=cma,ofi
    - spec: '^libfabric@2: fabrics=cxi,lnx,mrail,rxd,rxm,shm,sockets,tcp,udp'
modules:
  crayenv:
    roots:
      lmod: '%BASEROOT%/modules/crayenv'
    arch_folder: false
    lmod:
      all:
        template: cpe_compiler.lua
      core_compilers:
      - gcc@7.5.0
      - gcc@12.5.0
      exclude:
      - '@:'
      exclude_implicits: false
      gcc:
        environment:
          set:
            COMPAT_VERSION: '12.0'
            CRAY_LMOD_COMPILER: gnu/12.0
            GNU_PATH: '{prefix}'
            GNU_VERSION: '{version}'
            PE_ENV: GNU
            PRGENV: gnu
          prepend_path:
            MODULEPATH: /opt/cray/pe/lmod/modulefiles/comnet/gnu/12.0/ofi/1.0:/opt/cray/pe/lmod/modulefiles/compiler/gnu/12.0:/opt/cray/pe/lmod/modulefiles/mix_compilers
      hash_length: 0
      hierarchy:
      - mpi
      include:
      - gcc@14.3.0
      - intel-oneapi-compilers
      - nvhpc
      intel-oneapi-compilers:
        environment:
          set:
            COMPAT_VERSION: '2023.2'
            CRAY_LMOD_COMPILER: intel/2023.2
            INTEL_COMPILER_TYPE: ONEAPI
            INTEL_PATH: '{prefix}'
            INTEL_VERSION: '{version}'
            I_MPI_CC: icx
            I_MPI_CXX: icpx
            I_MPI_F77: ifx
            I_MPI_F90: ifx
            I_MPI_FC: ifx
            MPICH_CC: icx
            MPICH_CXX: icpx
            MPICH_FC: ifx
            OMPI_CC: icx
            OMPI_CXX: icpx
            OMPI_F77: ifx
            OMPI_FC: ifx
            PE_ENV: INTEL
            PRGENV: intel
          prepend_path:
            MODULEPATH: /opt/cray/pe/lmod/modulefiles/comnet/intel/2023.2/ofi/1.0:/opt/cray/pe/lmod/modulefiles/compiler/intel/2023.2:/opt/cray/pe/lmod/modulefiles/mix_compilers
      nvhpc:
        environment:
          set:
            COMPAT_VERSION: '20'
            CRAY_LMOD_COMPILER: nvidia/20
            CRAY_NVIDIA_VERSION: '{version}'
            NVIDIA_PATH: '{prefix}'
            NVIDIA_VERSION: '{version}'
            PE_ENV: NVIDIA
            PRGENV: nvidia
          prepend_path:
            LD_LIBRARY_PATH: '{prefix}/Linux_x86_64/{version}/compilers/lib'
            MODULEPATH: /opt/cray/pe/lmod/modulefiles/comnet/nvidia/20/ofi/1.0:/opt/cray/pe/lmod/modulefiles/compiler/nvidia/20:/opt/cray/pe/lmod/modulefiles/mix_compilers
      projections:
        intel-oneapi-compilers: intel/{version}
  default:
    lmod:
      c:
        environment:
          set:
            NCAR_BUILD_ENV: derecho-{name}-{version}
            NCAR_BUILD_ENV_COMPILER: derecho-{name}-{version}
      chapel:
        template: chapel.lua
        environment:
          set:
            CHPL_HOME: '{prefix}'
            CHPL_LAUNCHER: pals
            CHPL_MODULE_HOME: '{prefix}'
          prepend_path:
            PATH: '{prefix.bin}/hpe-cray-ex-x86_64'
      cuda:
        environment:
          set:
            CRAYPE_LINK_TYPE: dynamic
            CRAY_ACCEL_TARGET: nvidia80
            CRAY_ACCEL_VENDOR: nvidia
            CRAY_CUDATOOLKIT_DIR: '{prefix}'
            CRAY_CUDATOOLKIT_PREFIX: '{prefix}'
            CRAY_CUDATOOLKIT_VERSION: '{version}'
            CRAY_TCMALLOC_MEMFS_FORCE: '1'
            NCAR_LIBS_CRAYGTL: -lcuda -lcudart -lstdc++
          prepend_path:
            CRAY_LD_LIBRARY_PATH: '{prefix}/lib64'
      defaults:
      - libfabric@1.22.0
      gcc:
        environment:
          set:
            GNU_PATH: '{prefix}'
            GNU_VERSION: '{version}'
            PE_ENV: GNU
      intel-oneapi-compilers:
        environment:
          set:
            INTEL_COMPILER_TYPE: ONEAPI
            INTEL_PATH: '{prefix}'
            INTEL_VERSION: '{version}'
            NCAR_BUILD_ENV: derecho-intel-{version}
            NCAR_BUILD_ENV_COMPILER: derecho-intel-{version}
            PE_ENV: INTEL
      intel-oneapi-mpi:
        environment:
          set:
            FI_CXI_DEFAULT_CQ_SIZE: '131072'
            FI_CXI_OFLOW_BUF_SIZE: '12582912'
            I_MPI_OFI_PROVIDER: cxi
      mpi:
        environment:
          set:
            NCAR_BUILD_ENV_MPI: derecho-{compiler.name}-{compiler.version}-{name}-{version}
      nvhpc:
        environment:
          set:
            CRAY_NVIDIA_VERSION: '{version}'
            NVIDIA_PATH: '{prefix}'
            NVIDIA_VERSION: '{version}'
            PE_ENV: NVIDIA
      openmpi:
        environment:
          set:
            FI_CXI_DEFAULT_CQ_SIZE: '131072'
            FI_CXI_OFLOW_BUF_SIZE: '12582912'
            FI_LNX_PROV_LINKS: cxi+shm
            FI_PROVIDER: cxi+shm:lnx
