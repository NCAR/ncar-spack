mdep:
    parallel-netcdf@1.14.1
    hdf5+mpi@1.14.6
    netcdf+mpi@4.9.3 ^hdf5 %CMP%
    fftw+mpi@3.3.10
    darshan-runtime@3.4.7
    parallelio+mpi@2.6.8 %TC% ^hdf5 %CMP%
    esmf+mpi@8.9.0 %TC% ^hdf5 %CMP%
    parallelio~shared@2.6.8 %TC% ^hdf5 %CMP%
    osu-micro-benchmarks
    # CCE/19 build fails b/c linker flag -rdynamic not passed through by crayftn try again with cce/20?)
    gptl@8.1.1 <exclude:cce>
    # superlu-dist pragma lines (taskloop) is not supported by nvhpc; cce fails due to module capitalization
    superlu-dist@9.2.1 %TC% ^metis %CMP% ^parmetis %CMP% <exclude:nvhpc,cce>
    mpifileutils@0.12 <compilers:gcc> <mpis:openmpi>
    # This package is a pain to get to concretize correctly (i.e., use dependencies from the same compiler)
    # Definitely double-check the 'spack spec -l' before proceeding and adjust the spec to force the
    # behavior you want!
    # CCE/19 seems to fail with weird Fortran module issue; needs investigation.
    adios2+mpi@2.10.2 <nvhpc:-noswitcherror> %TC% ^libcatalyst %CMP% ^openblas %gcc@12.5.0 ^zfp %c,cxx,fortran=%CMP% ^py-mpi4py <nvhpc:-noswitcherror> %CMP% <exclude:cce> <gpu:cuda>

mdep: host=derecho,gust
