#
#   Package Manifest
#
#   Build Modes
#     singleton - only install spec with a single compiler
#     cdep      - install spec using all defined compilers
#     mdep      - install spec using all MPI libraries and either all compilers
#                 or a single specified compiler
#
#   Default Placeholders - appended to the end of the spec if not explicitly given
#     %CMP%     - gets replaced by %compiler (can also use %c,cxx,fortran=%CMP%)
#     %MPI%     - gets replaced by ^mpi %compiler
#     %TC%      - gets replaced by toolchain definition
#     %GC%      - gets replaced by generic compiler name (%gcc instead of %gcc@15.2.0)
#                 (probably not useful unless Spack refuses full compiler spec)
#
#   Sigils
#     #BREAK    - if put at the beginning of a line, will cause install_packages to
#                 stop processing the manifest there
#
#   Last Revised:   09:27, 20 Mar 2026
#

singleton: access=core host=derecho,gust
    libfabric@1.22.0

singleton: access=core type=compiler
    gcc@12.5.0 <toolchain:gcc-125> <blas:openblas@0.3.30> <matrix:no>

# Not dependent on CUDA, but let's only install these on CUDA systems
singleton: access=core type=compiler gpu=cuda
    nvhpc@26.1 <toolchain:nvhpc-261>
    intel-oneapi-compilers@2025.3.2 <toolchain:intel-2532> <blas:intel-oneapi-mkl@2025.3.1>
    # Keeping this here for reference, but testing has not shown AOCC to be interesting
    # Maybe when new flang is included (6.0.0?)
    #aocc@5.0.0 <toolchain:aocc-500> <blas:amdblis@5.1> <lapack:amdlibflame@5.1> <access:core> <type:compiler>

singleton: access=core type=compiler host=derecho,gust
    cce@20.0.0 <toolchain:cce-2000> <blas:cray-libsci@25.09.0>

# We put matrixed GCC versions last, as vendor compiler builds of packages should use
# GCC-12 builds of dependencies, which we want. Once those are built, the concretizer
# should prefer them as dependencies for the GCC 15 package as well. Otherwise, we will
# likely get newer GCC dependencies and more duplication.
singleton: access=core type=compiler
    gcc@15.2.0 <toolchain:gcc-152> <blas:openblas@0.3.30>

# Casper ROCm stack
singleton: gpu=rocm
    rocm-core@6.4.3

# These are technically installed in the external too, but Fortran modules get included into subsequent
# package builds and they are incompatible with host compilers (e.g., gcc), so this seems like the best
# workaround for now
singleton: gpu=rocm access=none compiler=core
    llvm-amdgpu@6.4.3
    rocm-openmp-extras@6.4.3       # Modifies llvm-amdgpu (yuck)

singleton: gpu=cuda access=core compiler=core
