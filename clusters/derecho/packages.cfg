    gdal@3.11.4 %TC% ^hdf5 %CMP% ^netcdf-c %CMP% ^proj %CMP% ^geos %CMP% <exclude:nvhpc,cce>
    eccodes@2.41.0 %TC% ^hdf5 %CMP%
    mpi-serial@2.5.3
    parallelio~mpi@2.6.8 %TC% ^mpi-serial %CMP% ^hdf5 %CMP%
    esmf~mpi@8.9.1 %TC% ^hdf5 %CMP% ^mpi-serial %CMP%
